[project]
name = "iperform-insights-coaching"
version = "11.0.1"
description = "iPerform Insights & Coaching local enterprise demo platform foundation"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pyTigerGraph>=1.8.0",
    "tigergraph-mcp>=1.0.0",
    "mcp>=1.9.0",
    "langchain-core>=0.3.0",
    "langchain>=0.3.0",
    "fastapi>=0.115.0",
    "uvicorn>=0.30.0",
    "streamlit>=1.38.0",
    "langgraph>=0.2.0",
    "openai>=1.40.0",
    "chromadb>=0.5.0",
    "pandas>=2.2.0",
    "numpy>=1.26.0",
    "scikit-learn>=1.5.0",
    "networkx>=3.3",
    "plotly>=5.22.0",
    "sqlalchemy>=2.0.0",
    "pydantic>=2.8.0",
    "pydantic-settings>=2.4.0",
    "python-dotenv>=1.0.1",
    "requests>=2.32.0",
    "aiohttp>=3.9.0",
    "loguru>=0.7.2",
    "python-multipart>=0.0.9",
]

[project.optional-dependencies]
dev = ["pytest>=8.2.0", "pytest-asyncio>=0.23.0", "ruff>=0.5.0"]

[tool.uv]
package = false

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
